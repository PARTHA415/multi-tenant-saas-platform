server:
  port: 8080

spring:
  application:
    name: multi-tenant-saas-platform

  data:
    mongodb:
      auto-index-creation: true

  cache:
    type: simple

de:
  flapdoodle:
    mongodb:
      embedded:
        version: 7.0.0


app:
  jwt:
    secret: Y2hhbmdlLXRoaXMtdG8tYS12ZXJ5LWxvbmctc2VjcmV0LWtleS1mb3ItcHJvZHVjdGlvbi11c2UtYXQtbGVhc3QtMjU2LWJpdHM=
    expiration-ms: 86400000

  rate-limit:
    free: 20
    starter: 60
    enterprise: 200

  billing:
    cost-per-api-call: 0.01
    cost-per-storage-unit: 0.001

# ============================================================
# AWS Configuration (always active)
# ============================================================
# Required environment variables:
#   AWS_ACCESS_KEY_ID / aws.access-key
#   AWS_SECRET_ACCESS_KEY / aws.secret-key
# ============================================================
aws:
  region: us-east-1
  access-key: ${AWS_ACCESS_KEY_ID:}
  secret-key: ${AWS_SECRET_ACCESS_KEY:}
  s3:
    bucket-name: ${AWS_S3_BUCKET:multi-tenant-saas-common-assets}
  lambda:
    invoice-function-name: ${AWS_LAMBDA_INVOICE_FUNC:generate-tenant-invoice}

logging:
  level:
    root: INFO
    com.multitenant.saas: DEBUG
    org.springframework.security: INFO
    org.springframework.data.mongodb: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method




