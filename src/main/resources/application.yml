server:
  port: 8080

spring:
  application:
    name: multi-tenant-saas-platform

  data:
    mongodb:
      auto-index-creation: true

  cache:
    type: simple

de:
  flapdoodle:
    mongodb:
      embedded:
        version: 7.0.0


app:
  jwt:
    secret: Y2hhbmdlLXRoaXMtdG8tYS12ZXJ5LWxvbmctc2VjcmV0LWtleS1mb3ItcHJvZHVjdGlvbi11c2UtYXQtbGVhc3QtMjU2LWJpdHM=
    expiration-ms: 86400000

  rate-limit:
    free: 20
    starter: 60
    enterprise: 200

  billing:
    cost-per-api-call: 0.01
    cost-per-storage-unit: 0.001

logging:
  level:
    root: INFO
    com.multitenant.saas: DEBUG
    org.springframework.security: INFO
    org.springframework.data.mongodb: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method




