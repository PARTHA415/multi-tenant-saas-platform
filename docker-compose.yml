version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas-platform
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/saas_platform
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_PROFILE=${AWS_PROFILE:-default}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-multi-tenant-saas-common-assets}
      - AWS_LAMBDA_INVOICE_FUNC=${AWS_LAMBDA_INVOICE_FUNC:-generate-tenant-invoice}
    volumes:
      - ${USERPROFILE}/.aws:/home/appuser/.aws:ro
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - saas-network
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: saas-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas-network
    restart: unless-stopped

volumes:
  mongo-data:
    driver: local

networks:
  saas-network:
    driver: bridge

