version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas-platform
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/saas_platform
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - saas-network
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: saas-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas-network
    restart: unless-stopped

volumes:
  mongo-data:
    driver: local

networks:
  saas-network:
    driver: bridge

